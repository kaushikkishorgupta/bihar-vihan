<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="description" content="Login to Bihar Vihaan - Tourism and Cultural Platform" />
    <title>Login - Bihar Vihaan</title>
    
    <link rel="icon" type="image/png" sizes="32x32" href="/assets/icons/favicon-32.png" />
    <link rel="stylesheet" href="/assets/css/style.css" />
    
    <style>
        .auth-container {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            background: linear-gradient(135deg, var(--brand) 0%, var(--brand-dark) 100%);
        }
        
        .auth-card {
            background: var(--surface);
            border-radius: var(--radius-lg);
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.1);
            padding: 40px;
            width: 100%;
            max-width: 400px;
            border: 1px solid var(--border);
        }
        
        .auth-header {
            text-align: center;
            margin-bottom: 30px;
        }
        
        .auth-logo {
            width: 80px;
            height: auto;
            margin-bottom: 20px;
        }
        
        .auth-title {
            font-size: 1.8rem;
            font-weight: 700;
            color: var(--text-primary);
            margin-bottom: 10px;
        }
        
        .auth-subtitle {
            color: var(--text-secondary);
            font-size: 0.95rem;
        }
        
        .form-group {
            margin-bottom: 20px;
        }
        
        .form-label {
            display: block;
            margin-bottom: 8px;
            font-weight: 500;
            color: var(--text-primary);
        }
        
        .form-input {
            width: 100%;
            padding: 12px 16px;
            border: 1px solid var(--border);
            border-radius: var(--radius);
            font-size: 1rem;
            background: var(--background);
            color: var(--text-primary);
            transition: all 0.3s ease;
        }
        
        .form-input:focus {
            outline: none;
            border-color: var(--brand);
            box-shadow: 0 0 0 3px rgba(var(--brand-rgb), 0.1);
        }
        
        .btn {
            width: 100%;
            padding: 14px 20px;
            border: none;
            border-radius: var(--radius);
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            text-decoration: none;
            display: inline-block;
            text-align: center;
        }
        
        .btn--primary {
            background: var(--brand);
            color: white;
        }
        
        .btn--primary:hover {
            background: var(--brand-dark);
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(var(--brand-rgb), 0.3);
        }
        
        .btn--ghost {
            background: transparent;
            color: var(--brand);
            border: 1px solid var(--brand);
        }
        
        .btn--ghost:hover {
            background: var(--brand);
            color: white;
        }
        
        .auth-footer {
            text-align: center;
            margin-top: 30px;
            padding-top: 20px;
            border-top: 1px solid var(--border);
        }
        
        .auth-footer p {
            color: var(--text-secondary);
            font-size: 0.9rem;
        }
        
        .auth-footer a {
            color: var(--brand);
            text-decoration: none;
            font-weight: 500;
        }
        
        .auth-footer a:hover {
            text-decoration: underline;
        }
        
        .alert {
            padding: 12px 16px;
            border-radius: var(--radius);
            margin-bottom: 20px;
            font-size: 0.9rem;
        }
        
        .alert--success {
            background: rgba(34, 197, 94, 0.1);
            color: #16a34a;
            border: 1px solid rgba(34, 197, 94, 0.2);
        }
        
        .alert--error {
            background: rgba(239, 68, 68, 0.1);
            color: #dc2626;
            border: 1px solid rgba(239, 68, 68, 0.2);
        }
        
        .loading {
            display: none;
            text-align: center;
            margin: 20px 0;
        }
        
        .spinner {
            width: 20px;
            height: 20px;
            border: 2px solid var(--border);
            border-top: 2px solid var(--brand);
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 0 auto;
        }
        
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        
        .back-to-home {
            position: absolute;
            top: 20px;
            left: 20px;
            color: white;
            text-decoration: none;
            font-weight: 500;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        
        .back-to-home:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>
    <a href="/" class="back-to-home">← Back to Home</a>
    
    <div class="auth-container">
        <div class="auth-card">
            <div class="auth-header">
                <img src="/assets/img/LOGO.png" alt="Bihar Vihaan" class="auth-logo">
                <h1 class="auth-title">Welcome Back</h1>
                <p class="auth-subtitle">Login to your Bihar Vihaan account</p>
            </div>
            
            <div id="alertContainer"></div>
            
            <form id="loginForm">
                <div class="form-group">
                    <label for="email" class="form-label">Email Address</label>
                    <input 
                        type="email" 
                        id="email" 
                        name="email" 
                        class="form-input" 
                        placeholder="Enter your email"
                        required
                    />
                </div>
                
                <div class="form-group">
                    <label for="password" class="form-label">Password</label>
                    <input 
                        type="password" 
                        id="password" 
                        name="password" 
                        class="form-input" 
                        placeholder="Enter your password"
                        required
                    />
                </div>
                
                <button type="submit" class="btn btn--primary" id="loginBtn">
                    Sign In
                </button>
            </form>
            
            <div class="loading" id="loading">
                <div class="spinner"></div>
                <p>Signing in...</p>
            </div>
            
            <div class="auth-footer">
                <p>Don't have an account? <a href="/signup.html">Sign up</a></p>
                <p><a href="/admin.html">Admin Login</a></p>
            </div>
        </div>
    </div>
    
    <script>
        // API Configuration for Production
        const API_BASE_URL = window.location.hostname === 'localhost' 
            ? 'http://localhost:3000'
            : 'https://bihar-vihan-api.onrender.com';
        
        console.log('🔧 API Base URL:', API_BASE_URL);
        console.log('🌍 Environment:', window.location.hostname === 'localhost' ? 'development' : 'production');
        
        class LoginHandler {
            constructor() {
                this.form = document.getElementById('loginForm');
                this.alertContainer = document.getElementById('alertContainer');
                this.loading = document.getElementById('loading');
                this.loginBtn = document.getElementById('loginBtn');
                
                this.init();
            }
            
            init() {
                this.form.addEventListener('submit', (e) => {
                    e.preventDefault();
                    this.handleLogin();
                });
            }
            
            async handleLogin() {
                const email = document.getElementById('email').value;
                const password = document.getElementById('password').value;
                
                // Show loading
                this.showLoading();
                
                try {
                    // For admin login, we'll use username instead of email
                    // since the backend expects username
                    console.log('🚀 Sending login request to:', `${API_BASE_URL}/api/admin/login`);
                    console.log('📤 Request data:', { email, password: '***' });
                    
                    const response = await fetch(`${API_BASE_URL}/api/admin/login`, {
                        method: 'POST',
                        headers: {
                            'Content-Type': 'application/json',
                        },
                        body: JSON.stringify({
                            username: email, // Using email as username for admin
                            password: password
                        })
                    });
                    
                    console.log('📥 Response status:', response.status);
                    console.log('📥 Response headers:', response.headers);
                    
                    const data = await response.json();
                    console.log('📥 Response data:', data);
                    
                    if (data.success) {
                        // Store JWT token
                        localStorage.setItem('adminToken', data.token);
                        localStorage.setItem('adminUser', JSON.stringify(data.user));
                        
                        console.log('✅ Login successful:', data.user);
                        
                        // Show success message
                        this.showAlert('Login successful! Redirecting...', 'success');
                        
                        // Redirect to admin panel
                        setTimeout(() => {
                            window.location.href = '/admin.html';
                        }, 1500);
                    } else {
                        console.error('❌ Login failed:', data.message);
                        this.showAlert(data.message || 'Login failed. Please check your credentials.', 'error');
                    }
                } catch (error) {
                    console.error('🚨 Network error:', error);
                    console.error('🚨 Error details:', {
                        message: error.message,
                        stack: error.stack
                    });
                    this.showAlert('Login failed. Please try again later.', 'error');
                } finally {
                    this.hideLoading();
                }
            }
            
            showLoading() {
                this.loading.style.display = 'block';
                this.loginBtn.disabled = true;
                this.loginBtn.textContent = 'Signing in...';
            }
            
            hideLoading() {
                this.loading.style.display = 'none';
                this.loginBtn.disabled = false;
                this.loginBtn.textContent = 'Sign In';
            }
            
            showAlert(message, type) {
                this.alertContainer.innerHTML = `
                    <div class="alert alert--${type}">
                        ${message}
                    </div>
                `;
                
                // Auto-hide after 5 seconds
                setTimeout(() => {
                    this.alertContainer.innerHTML = '';
                }, 5000);
            }
        }
        
        // Initialize login handler when DOM is loaded
        document.addEventListener('DOMContentLoaded', () => {
            new LoginHandler();
        });
    </script>
</body>
</html>
